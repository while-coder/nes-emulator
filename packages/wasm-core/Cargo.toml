[package]
name = "nes-core"
version = "0.1.0"
edition = "2021"
description = "NES emulator core wrapped for WebAssembly (基于 takahirox/nes-rust)"

[lib]
# cdylib: 供 wasm-pack 产出 wasm;rlib: 便于本地 cargo test
crate-type = ["cdylib", "rlib"]

[dependencies]
# 本地 vendor 副本包含少量兼容性修复，避免部分 ROM 的 mapper 行为越界。
nes_rust = { path = "../../vendor/nes-rust" }
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
