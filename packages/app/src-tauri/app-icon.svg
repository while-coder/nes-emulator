<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：红白机风格的深红到亮红 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8102E"/>
      <stop offset="1" stop-color="#7E0A1C"/>
    </linearGradient>
    <!-- 手柄机身渐变 -->
    <linearGradient id="body" x1="512" y1="372" x2="512" y2="652" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDEDED"/>
      <stop offset="1" stop-color="#C2C2C2"/>
    </linearGradient>
    <!-- A/B 按钮渐变 -->
    <radialGradient id="btn" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#E23744"/>
      <stop offset="1" stop-color="#9E0C1B"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- 复古扫描线装饰 -->
  <g opacity="0.06" fill="#ffffff">
    <rect x="0" y="120" width="1024" height="6"/>
    <rect x="0" y="260" width="1024" height="6"/>
    <rect x="0" y="760" width="1024" height="6"/>
    <rect x="0" y="900" width="1024" height="6"/>
  </g>

  <!-- 手柄主体 -->
  <g filter="url(#shadow)">
    <rect x="176" y="372" width="672" height="280" rx="44" fill="url(#body)" stroke="#8C8C8C" stroke-width="4"/>

    <!-- 顶部红黑装饰条 -->
    <rect x="176" y="372" width="672" height="64" rx="44" fill="#2B2B2B"/>
    <rect x="176" y="416" width="672" height="20" fill="#2B2B2B"/>
    <rect x="176" y="396" width="672" height="14" fill="#C8102E"/>

    <!-- 左侧 D-pad（十字方向键） -->
    <g fill="#1F1F1F">
      <rect x="280" y="486" width="160" height="56" rx="10"/>
      <rect x="332" y="434" width="56" height="160" rx="10"/>
    </g>
    <circle cx="360" cy="514" r="20" fill="#0F0F0F"/>

    <!-- 中间 Select / Start 按钮 -->
    <g>
      <rect x="448" y="556" width="58" height="22" rx="11" fill="#1F1F1F"/>
      <rect x="520" y="556" width="58" height="22" rx="11" fill="#1F1F1F"/>
      <rect x="448" y="528" width="130" height="12" rx="6" fill="#8C8C8C" opacity="0.6"/>
    </g>

    <!-- 右侧 A / B 圆形按钮 -->
    <circle cx="650" cy="514" r="46" fill="#2B2B2B"/>
    <circle cx="650" cy="514" r="40" fill="url(#btn)"/>
    <circle cx="760" cy="514" r="46" fill="#2B2B2B"/>
    <circle cx="760" cy="514" r="40" fill="url(#btn)"/>
  </g>
</svg>
